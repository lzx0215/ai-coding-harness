name: CI

on:
  push:
    branches:
      - master
      - "codex/**"
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate harness runs
        shell: bash
        run: |
          for run_dir in harness/runs/*; do
            if [ -d "$run_dir" ]; then
              python -m harness.cli validate "$run_dir"
            fi
          done

      - name: Smoke console script
        run: harness validate harness/runs/example-fast-doc-change

      - name: Check whitespace
        shell: bash
        run: |
          git fetch --no-tags --prune origin '+refs/heads/*:refs/remotes/origin/*'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="$(git merge-base HEAD "origin/${{ github.base_ref }}")"
          elif git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            base="${{ github.event.before }}"
          else
            base="$(git merge-base HEAD origin/master)"
          fi
          git diff --check "$base" HEAD

  package-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package non-editable
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Smoke packaged console script from outside repository
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.tmp"
          trap 'rm -rf "$GITHUB_WORKSPACE/.tmp/package-smoke-run"' EXIT
          cd "$RUNNER_TEMP"
          harness validate "$GITHUB_WORKSPACE/harness/runs/example-fast-doc-change"
          for run_dir in "$GITHUB_WORKSPACE"/harness/runs/*; do
            if [ -d "$run_dir" ]; then
              harness validate "$run_dir"
            fi
          done
          harness init-run "$GITHUB_WORKSPACE/.tmp/package-smoke-run" --run-id package-smoke --track Fast --workflow fast-doc-change --base-commit HEAD
          harness validate "$GITHUB_WORKSPACE/.tmp/package-smoke-run"
          cat > "$GITHUB_WORKSPACE/.tmp/package-smoke-scheduler-agent.py" <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ["HARNESS_AGENT_INPUT_FILE"]).read_text(encoding="utf-8"))
          output = {
              "run_id": payload["run_id"],
              "job_id": payload["job_id"],
              "agent": payload["agent"],
              "adapter": payload["adapter"],
              "status": "passed",
              "summary": "Package smoke scheduler agent completed.",
              "findings": [],
              "evidence": [],
              "not_tested": [],
              "residual_risks": [],
              "generated_at": payload["created_at"],
          }
          Path(os.environ["HARNESS_AGENT_OUTPUT_FILE"]).write_text(
              json.dumps(output, indent=2) + "\n",
              encoding="utf-8",
          )
          print("package-smoke-scheduler-agent wrote output")
          PY
          harness queue-generic-agent "$GITHUB_WORKSPACE/.tmp/package-smoke-run" package-smoke-scheduler --agent package-smoke-agent --timeout-seconds 30 -- python "$GITHUB_WORKSPACE/.tmp/package-smoke-scheduler-agent.py"
          harness run-scheduler "$GITHUB_WORKSPACE/.tmp/package-smoke-run" --once
          harness aggregate-jobs "$GITHUB_WORKSPACE/.tmp/package-smoke-run"
          harness index-evidence "$GITHUB_WORKSPACE/.tmp/package-smoke-run" agent-job jobs/package-smoke-scheduler/job.json --description "Package smoke scheduler job."
          harness index-evidence "$GITHUB_WORKSPACE/.tmp/package-smoke-run" agent-result jobs/package-smoke-scheduler/output.json --description "Package smoke scheduler result."
          harness index-evidence "$GITHUB_WORKSPACE/.tmp/package-smoke-run" aggregation jobs/aggregation.json --description "Package smoke job aggregation."
          harness validate "$GITHUB_WORKSPACE/.tmp/package-smoke-run"
          cat > "$GITHUB_WORKSPACE/.tmp/package-smoke-watch-agent.py" <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ["HARNESS_AGENT_INPUT_FILE"]).read_text(encoding="utf-8"))
          output = {
              "run_id": payload["run_id"],
              "job_id": payload["job_id"],
              "agent": payload["agent"],
              "adapter": payload["adapter"],
              "status": "passed",
              "summary": "Package smoke watch agent completed.",
              "findings": [],
              "evidence": [],
              "not_tested": [],
              "residual_risks": [],
              "generated_at": payload["created_at"],
          }
          Path(os.environ["HARNESS_AGENT_OUTPUT_FILE"]).write_text(
              json.dumps(output, indent=2) + "\n",
              encoding="utf-8",
          )
          print("package-smoke-watch-agent wrote output")
          PY
          harness queue-generic-agent "$GITHUB_WORKSPACE/.tmp/package-smoke-run" package-smoke-watch --agent package-smoke-watch-agent --timeout-seconds 30 -- python "$GITHUB_WORKSPACE/.tmp/package-smoke-watch-agent.py"
          harness run-scheduler "$GITHUB_WORKSPACE/.tmp/package-smoke-run" --watch --poll-interval-seconds 0.1 --max-iterations 3
          harness index-evidence "$GITHUB_WORKSPACE/.tmp/package-smoke-run" agent-job jobs/package-smoke-watch/job.json --description "Package smoke watch scheduler job."
          harness index-evidence "$GITHUB_WORKSPACE/.tmp/package-smoke-run" agent-result jobs/package-smoke-watch/output.json --description "Package smoke watch scheduler result."
          harness aggregate-jobs "$GITHUB_WORKSPACE/.tmp/package-smoke-run"
          harness index-evidence "$GITHUB_WORKSPACE/.tmp/package-smoke-run" aggregation jobs/aggregation.json --description "Package smoke watch job aggregation."
          harness validate "$GITHUB_WORKSPACE/.tmp/package-smoke-run"
